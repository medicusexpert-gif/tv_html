<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .loading {
      color: white;
      font-family: Arial, sans-serif;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      font-size: 28px;
    }
  </style>
</head>

<body>

<div id="loading" class="loading">Ładowanie dokumentu...</div>

<script>
  const url = "https://1drv.ms/x/c/54e32aaae4b04f4b/IQAz7EAPk0CNTa1CSZcImkRFAS4GZ4dw9qVO5Vk5SG9tMHA?e=NJ1Cqj";

  const loadingDiv = document.getElementById("loading");

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  // timeout bezpieczeństwa: jeśli nie załaduje się w 60 sekund -> reload strony
  const loadTimeout = setTimeout(() => {
    location.reload();
  }, 60000);

  function loadIframe() {
    const iframe = document.createElement("iframe");
    iframe.src = url + "&t=" + Date.now();
    iframe.loading = "eager";
    iframe.allowFullscreen = true;

    iframe.onload = function () {
      clearTimeout(loadTimeout);
      loadingDiv.style.display = "none";
    };

    document.body.appendChild(iframe);
  }

  if (isIOS) {
    window.location.replace(url);
  } else {
    loadIframe();
  }

  // odświeżanie iframe co 15 minut
  setInterval(() => {
    if (isIOS) {
      window.location.reload();
    } else {
      const iframe = document.querySelector("iframe");
      if (iframe) iframe.src = url + "&t=" + Date.now();
    }
  }, 900000);

  // pełny reload strony co 2 godziny (bardzo pomaga na TV)
  setInterval(() => {
    window.location.reload();
  }, 7200000);
</script>

</body>
</html>
