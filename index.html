<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .loading {
      color: white;
      font-family: Arial, sans-serif;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
  </style>
</head>

<body>

<div id="loading" class="loading">Ładowanie dokumentu...</div>

<script>
  const url = "https://medicuscompl-my.sharepoint.com/personal/mwitkowski_medicus_com_pl/_layouts/15/Doc.aspx?sourcedoc={27de3008-e94f-4309-9303-f218dc59e037}&action=embedview&wdAllowInteractivity=False&wdHideGridlines=True&wdHideHeaders=True&wdDownloadButton=True";

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  if (isIOS) {
    window.location.replace(url);
  } else {
    const iframe = document.createElement("iframe");
    iframe.src = url;

    iframe.onload = function () {
      document.getElementById("loading").style.display = "none";
    };

    document.body.appendChild(iframe);
  }

  // odświeżanie co 900 sek (15 minut)
  setInterval(() => {
    if (isIOS) {
      window.location.reload();
    } else {
      const iframe = document.querySelector("iframe");
      if (iframe) iframe.src = url + "&t=" + Date.now();
    }
  }, 900000);
</script>

</body>
</html>
